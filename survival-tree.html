<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survival — Spec Talent Tree</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at 50% 30%, #2a1505 0%, #120802 50%, #080402 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    padding: 30px 20px;
  }
  .talent-window {
    background: linear-gradient(180deg, rgba(22,12,4,0.97) 0%, rgba(10,5,2,0.99) 100%);
    border: 1px solid #5a3a10;
    border-top: 2px solid #C8A84B;
    border-radius: 6px;
    padding: 20px 30px 28px;
    box-shadow: 0 0 60px rgba(200,168,75,0.08), 0 0 120px rgba(0,0,0,0.8), inset 0 1px 0 rgba(200,168,75,0.15);
    position: relative;
  }
  .tree-header {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 2px 0 10px;
  }
  .tree-name {
    color: #C8A84B; font-size: 13px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .tree-pts {
    color: #666; font-size: 13px; font-family: 'Crimson Text', serif;
  }
  svg.tree { display: block; }
</style>
</head>
<body>
<div class="talent-window">
  <div class="tree-header">
    <span class="tree-name">SURVIVAL</span>
    <span class="tree-pts">0</span>
  </div>
  <div id="treeContainer"></div>
</div>

<script>
const GOLD     = '#C8A84B';
const GOLD_DIM = '#7a5a20';
const NODE_FILL= '#110a03';
const LINE_DIM = '#3a2a08';
const R        = 18;
const CW       = 48;
const RH       = 52;
const PAD      = 30;

// ─── SURVIVAL LAYOUT ─────────────────────────────────────────
const survRowDefs = [
  { cols: [4],             choices: [] },         // row 0
  { cols: [3,5],           choices: [] },         // row 1
  { cols: [3,5],           choices: [] },         // row 2
  { cols: [2,4,6],         choices: [] },         // row 3
  { cols: [1,3,4,5,7],     choices: [1] },       // row 4 — choice at col 1
  { cols: [2,3,5,6],       choices: [2] },       // row 5 — choice at col 2
  { cols: [1,2,3,4,5,6,7], choices: [1,5] },    // row 6 — choice at cols 1,5
  { cols: [2,4,6],         choices: [] },         // row 7
  { cols: [2,3,5,6],       choices: [] },         // row 8
  { cols: [1,3,4,5,7],     choices: [] },         // row 9
];

let nid = 0;
const nodes = [];
survRowDefs.forEach((rowDef, r) => {
  rowDef.cols.forEach(c => {
    const isChoice = rowDef.choices.includes(c);
    nodes.push({ id: `sv${nid++}`, c, r, choice: isChoice });
  });
});

// Row 10: apex capstone (big circle)
nodes.push({ id: 'sv_apex', c: 4, r: 10.5, capstone: true });

// Row 11: 3 tier dots wrapping around bottom of apex
const apexX = PAD + 4 * CW;
const apexY = PAD + 10.5 * RH;
const tierR = 32; // distance from apex center
nodes.push(
  { id: 'sv_t1', c: 4 - 0.65, r: 10.5 + 0.7, tier: true },
  { id: 'sv_t2', c: 4,        r: 10.5 + 0.85, tier: true },
  { id: 'sv_t3', c: 4 + 0.65, r: 10.5 + 0.7, tier: true },
);

// ─── RENDER ──────────────────────────────────────────────────
function px(node) {
  return { x: PAD + node.c * CW, y: PAD + node.r * RH };
}

const maxC = Math.max(...nodes.map(n => n.c));
const maxR = Math.max(...nodes.map(n => n.r));
const W = (maxC + 1) * CW + PAD * 2 - CW * 0.3;
const H = (maxR + 1) * RH + PAD * 2;

const NS = 'http://www.w3.org/2000/svg';
const svg = document.createElementNS(NS, 'svg');
svg.setAttribute('width', W); svg.setAttribute('height', H);
svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
svg.classList.add('tree');

function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k, v));
  return e;
}

const defs = el('defs', {});
const filter = el('filter', {id:'glow', x:'-50%', y:'-50%', width:'200%', height:'200%'});
filter.appendChild(el('feGaussianBlur', {stdDeviation:'2.5', result:'blur'}));
const merge = el('feMerge', {});
merge.appendChild(el('feMergeNode', {in:'blur'}));
merge.appendChild(el('feMergeNode', {in:'SourceGraphic'}));
filter.appendChild(merge);
defs.appendChild(filter);
svg.appendChild(defs);

nodes.forEach(node => {
  const p = px(node);
  const g = document.createElementNS(NS, 'g');
  g.style.cursor = 'pointer';

  if (node.capstone) {
    g.appendChild(el('circle', {cx:p.x, cy:p.y, r:28, fill:NODE_FILL, stroke:GOLD, 'stroke-width':'3', filter:'url(#glow)'}));
    g.appendChild(el('circle', {cx:p.x, cy:p.y, r:22, fill:'none', stroke:GOLD_DIM, 'stroke-width':'1'}));
  } else if (node.tier) {
    g.appendChild(el('circle', {cx:p.x, cy:p.y, r:7, fill:NODE_FILL, stroke:GOLD_DIM, 'stroke-width':'1.5'}));
  } else if (node.choice) {
    g.appendChild(el('circle', {cx:p.x, cy:p.y, r:R, fill:NODE_FILL, stroke:GOLD_DIM, 'stroke-width':'1.5'}));
    g.appendChild(el('circle', {cx:p.x, cy:p.y, r:R-4, fill:'none', stroke:LINE_DIM, 'stroke-width':'0.8'}));
    g.appendChild(el('line', {x1:p.x, y1:p.y-R+5, x2:p.x, y2:p.y+R-5, stroke:GOLD_DIM, 'stroke-width':'1', 'stroke-dasharray':'2 2'}));
  } else {
    g.appendChild(el('circle', {cx:p.x, cy:p.y, r:R, fill:NODE_FILL, stroke:GOLD_DIM, 'stroke-width':'1.5'}));
    g.appendChild(el('circle', {cx:p.x, cy:p.y, r:R-5, fill:'none', stroke:LINE_DIM, 'stroke-width':'0.8'}));
  }

  g.addEventListener('mouseenter', () => {
    const c = g.querySelector('circle');
    if (!node.tier) { c.setAttribute('stroke', GOLD); c.setAttribute('stroke-width', node.capstone?'3.5':'2.5'); }
  });
  g.addEventListener('mouseleave', () => {
    const c = g.querySelector('circle');
    if (!node.tier) { c.setAttribute('stroke', node.capstone?GOLD:GOLD_DIM); c.setAttribute('stroke-width', node.capstone?'3':'1.5'); }
  });

  svg.appendChild(g);
});

document.getElementById('treeContainer').appendChild(svg);
</script>
</body>
</html>
